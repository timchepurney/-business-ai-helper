<!DOCTYPE html>
<html>
<head>

<title>Astris</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
}


header{
height:110px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 7%;
background:#000;
position:sticky;
top:0;
}


.logo{
font-size:45px;
font-weight:900;
letter-spacing:12px;
}



nav{
display:flex;
gap:25px;
}



nav a{

color:white;

text-decoration:none;

font-size:22px;

font-weight:700;

background:#111;

padding:14px 25px;

border-radius:30px;

transition:.2s;

}



nav a:hover{

background:white;

color:black;

}



.hero{

height:80vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}



.hero h1{

font-size:120px;

letter-spacing:20px;

}



.hero p{

font-size:25px;

color:#777;

margin:30px;

}



.shop-btn{

padding:22px 80px;

border-radius:50px;

border:none;

background:white;

color:black;

font-size:24px;

font-weight:900;

cursor:pointer;

}



.shop{

padding:80px 7%;

}



h2{

font-size:55px;

margin-bottom:40px;

}



.cards{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:30px;

}



.card{

height:330px;

background:#111;

border:1px solid #222;

border-radius:30px;

padding:30px;

display:flex;

flex-direction:column;

justify-content:end;

}



.card h3{

font-size:35px;

}



.card p{

color:#888;

font-size:22px;

margin:10px 0;

}



.buy{

background:white;

color:black;

border:none;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

width:fit-content;

}



.clothes{

margin-top:100px;

}



@media(max-width:800px){

header{

height:90px;

padding:0 20px;

}


.logo{

font-size:30px;

}


nav{

gap:8px;

}


nav a{

font-size:14px;

padding:10px 12px;

}


.hero h1{

font-size:60px;

}


.cards{

grid-template-columns:1fr;

}


h2{

font-size:40px;

}

}

</style>

</head>



<body>


<header>


<div class="logo">ASTRIS</div>


<nav>

<a href="#home">Home</a>

<a href="#accessories">Accessories</a>

<a href="#clothes">Clothing</a>


</nav>


</header>



<section class="hero" id="home">


<h1>ASTRIS</h1>


<p>Premium moto accessories & streetwear</p>


<a href="#accessories">
<button class="shop-btn">Shop Now</button>
</a>


</section>





<section class="shop" id="accessories">


<h2>Accessories</h2>


<div class="cards">



<div class="card">

<h3>Foot Locks</h3>

<p>$40</p>

<button class="buy">Buy Now</button>

</div>



<div class="card">

<h3>Grips</h3>

<p>$25</p>

<button class="buy">Buy Now</button>

</div>



<div class="card">

<h3>Stickers</h3>

<p>$10</p>

<button class="buy">Buy Now</button>

</div>



<div class="card">

<h3>Pegs</h3>

<p>$45</p>

<button class="buy">Buy Now</button>

</div>



</div>


</section>





<section class="shop clothes" id="clothes">


<h2>Clothing</h2>


<div class="cards">



<div class="card">

<h3>ASTRIS Tee</h3>

<p>$35</p>

<button class="buy">Buy Now</button>

</div>



<div class="card">

<h3>ASTRIS Hoodie</h3>

<p>$70</p>

<button class="buy">Buy Now</button>

</div>



</div>


</section>



</body>
</html>
