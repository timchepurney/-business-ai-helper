<!DOCTYPE html>
<html>
<head>
<title>ASTRIS Moto</title>
<style>
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{
margin:0;
background:#000;
color:white;
}
header{
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid #222;
}
.logo{
font-size:28px;
font-weight:900;
letter-spacing:4px;
}
.menu{
font-size:28px;
cursor:pointer;
}
nav{
display:none;
position:absolute;
right:20px;
top:70px;
background:#111;
padding:20px;
border-radius:15px;
}
nav a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}
.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
.hero h1{
font-size:70px;
letter-spacing:8px;
}
.hero p{
color:#aaa;
}
button{
background:white;
color:black;
border:none;
padding:15px 30px;
border-radius:30px;
font-weight:bold;
}
.section{
padding:30px;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
}
.card{
background:#111;
padding:20px;
border-radius:20px;
border:1px solid #222;
}
.card h3{
margin-bottom:5px;
}
.price{
color:#aaa;
}
</style>
</head>

<body>

<header>
<div class="logo">ASTRIS</div>

<div class="menu" onclick="openMenu()">☰</div>

<nav id="nav">
<a href="#">Home</a>
<a href="#">Accessories</a>
<a href="#">Clothing</a>
<a href="#">Cart</a>
</nav>
</header>


<section class="hero">
<h1>ASTRIS</h1>
<p>Premium moto accessories & streetwear</p>
<button>Shop Now</button>
</section>


<section class="section">

<h2>Most Popular</h2>

<div class="products">

<div class="card">
<h3>Foot Pegs</h3>
<p class="price">$49.99</p>
</div>

<div class="card">
<h3>Bike Grips</h3>
<p class="price">$19.99</p>
</div>

<div class="card">
<h3>Stickers</h3>
<p class="price">$9.99</p>
</div>

<div class="card">
<h3>ASTRIS Tee</h3>
<p class="price">$29.99</p>
</div>

<div class="card">
<h3>ASTRIS Hoodie</h3>
<p class="price">$59.99</p>
</div>

</div>

</section>


<script>
function openMenu(){
let menu=document.getElementById("nav");
if(menu.style.display=="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}
}
</script>

</body>
</html>
