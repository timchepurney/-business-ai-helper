<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Astris Moto</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
}


header{
height:90px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
border-bottom:1px solid #222;
}


.logo{
font-size:38px;
font-weight:900;
letter-spacing:4px;
}


.menu{
font-size:38px;
cursor:pointer;
}



.page{
display:none;
padding:50px;
min-height:90vh;
}


.active{
display:block;
}



.hero h1{
font-size:90px;
}


.hero p{
color:#aaa;
font-size:24px;
margin-top:20px;
}



button{
margin-top:30px;
padding:18px 40px;
border-radius:40px;
border:none;
cursor:pointer;
font-size:18px;
}


.shop{
background:white;
}



.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}


.card{

background:#111;
border:1px solid #222;
border-radius:25px;
padding:30px;
width:280px;

}



.back{

background:#222;
color:white;

}


/* MENU */

#sideMenu{

position:fixed;
top:0;
right:-300px;
width:300px;
height:100%;
background:#111;
padding:35px;
transition:.3s;
z-index:5;

}


#sideMenu a{

display:block;
color:white;
text-decoration:none;
font-size:24px;
margin:25px 0;
cursor:pointer;

}


.close{

font-size:35px;
cursor:pointer;

}


</style>


</head>



<body>


<header>

<div class="logo">ASTRIS</div>

<div class="menu" onclick="toggleMenu()">☰</div>

</header>



<div id="sideMenu">

<div class="close" onclick="toggleMenu()">✕</div>

<a onclick="showPage('home')">Home</a>
<a onclick="showPage('accessories')">Accessories</a>
<a onclick="showPage('clothing')">Clothing</a>
<a onclick="showPage('parts')">Parts</a>

</div>





<div id="home" class="page active hero">

<h1>Ride Different.</h1>

<p>
Premium accessories and style for electric riders.
</p>


<button class="shop" onclick="showPage('accessories')">
Shop Now
</button>


</div>





<div id="accessories" class="page">

<h1>Accessories</h1>

<div class="cards">

<div class="card">
<h2>Bike Gear</h2>
<p>Clean upgrades for your ride.</p>
</div>

<div class="card">
<h2>Extras</h2>
<p>Make your setup yours.</p>
</div>

</div>


<button class="back" onclick="showPage('home')">
← Back
</button>


</div>





<div id="clothing" class="page">

<h1>Clothing</h1>

<div class="cards">

<div class="card">
<h2>Hoodies</h2>
<p>Astris street style.</p>
</div>

<div class="card">
<h2>Tees</h2>
<p>Rider fits.</p>
</div>

</div>


<button class="back" onclick="showPage('home')">
← Back
</button>


</div>





<div id="parts" class="page">

<h1>Parts</h1>

<div class="cards">

<div class="card">
<h2>Upgrades</h2>
<p>Build your setup.</p>
</div>

</div>


<button class="back" onclick="showPage('home')">
← Back
</button>


</div>






<script>


function toggleMenu(){

let menu=document.getElementById("sideMenu");

if(menu.style.right==="0px"){

menu.style.right="-300px";

}else{

menu.style.right="0px";

}

}



function showPage(page){

let pages=document.querySelectorAll(".page");

pages.forEach(p=>p.classList.remove("active"));

document.getElementById(page).classList.add("active");

document.getElementById("sideMenu").style.right="-300px";

}


</script>


</body>

</html>
