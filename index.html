<!DOCTYPE html>
<html>
<head>

<title>Astris</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
}


header{

height:140px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 6%;

background:#000;
position:sticky;
top:0;
z-index:10;

}


.logo{

font-size:60px;
font-weight:900;
letter-spacing:15px;

}



nav{

display:flex;
gap:25px;

}



nav button,.cart{

background:#111;

color:white;

border:1px solid #333;

padding:22px 38px;

border-radius:50px;

font-size:22px;

font-weight:900;

cursor:pointer;

}



nav button:hover,.cart:hover{

background:white;
color:black;

}



.section{

padding:80px 7%;

}



.cards{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;

}



.card{

background:#111;

border:1px solid #333;

border-radius:35px;

padding:30px;

cursor:pointer;

}



.card img{

width:100%;

height:230px;

object-fit:cover;

border-radius:25px;

}



.card h3{

font-size:38px;

margin-top:15px;

}



.card p{

font-size:24px;

color:#aaa;

}



.add,.buy,.back{

padding:20px 40px;

border:none;

border-radius:45px;

font-size:22px;

font-weight:900;

cursor:pointer;

margin-top:20px;

}



.add{

background:white;

color:black;

}



.buy{

background:#222;

color:white;

}



.back{

background:#111;

color:white;

}



#product-page{

display:none;

}



#cart-box{

display:none;

position:fixed;

right:25px;

top:130px;

width:430px;

background:#111;

border:1px solid #333;

border-radius:35px;

padding:35px;

z-index:50;

}



.cart-line{

display:flex;

justify-content:space-between;

margin:20px 0;

}



.remove{

background:#222;

color:white;

border:none;

padding:10px;

border-radius:20px;

}



@media(max-width:800px){

.cards{

grid-template-columns:1fr;

}


.logo{

font-size:38px;

}


nav button,.cart{

font-size:15px;

padding:14px;

}

}


</style>

</head>


<body>


<header>

<div class="logo">ASTRIS</div>


<nav>

<button onclick="showProducts()">Home</button>

<button onclick="filter('accessories')">Accessories</button>

<button onclick="filter('clothes')">Clothing</button>

</nav>


<button class="cart" onclick="openCart()">

🖤 Cart (<span id="count">0</span>)

</button>

</header>



<div id="products" class="section">


<h1>Most Popular</h1>


<div class="cards">


<div class="card accessories" onclick="openProduct('Foot Locks',40,'Images/footlocks.jpg')">

<img src="Images/footlocks.jpg">

<h3>Foot Locks</h3>

<p>$40</p>

</div>


<div class="card clothes" onclick="openProduct('ASTRIS Hoodie',70,'Images/hoodie.jpg')">

<img src="Images/hoodie.jpg">

<h3>ASTRIS Hoodie</h3>

<p>$70</p>

</div>


<div class="card clothes" onclick="openProduct('ASTRIS Tee',35,'Images/tee.jpg')">

<img src="Images/tee.jpg">

<h3>ASTRIS Tee</h3>

<p>$35</p>

</div>


</div>

</div>




<div id="product-page" class="section">

<button class="back" onclick="back()">

← Back

</button>


<img id="product-img" width="450">


<h1 id="product-name"></h1>

<h2 id="product-price"></h2>


<button class="add" onclick="addCurrent()">

🖤 Add to Cart

</button>


<button class="buy">

Buy Now

</button>


</div>




<div id="cart-box">


<h2>Your Cart</h2>


<div id="items"></div>


<h3>Total: $<span id="total">0</span></h3>


<button class="back" onclick="closeCart()">

Close

</button>


</div>





<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let current={};


function save(){

localStorage.setItem("cart",JSON.stringify(cart));

}



function addCurrent(){

add(current.name,current.price);

}



function add(name,price){

cart.push({name,price});

save();

update();

}



function update(){

document.getElementById("count").innerHTML=cart.length;


let html="";

let total=0;


cart.forEach((x,i)=>{

total+=x.price;


html+=`

<div class="cart-line">

${x.name} $${x.price}

<button class="remove" onclick="removeItem(${i})">

X

</button>

</div>

`;

});


document.getElementById("items").innerHTML=html;

document.getElementById("total").innerHTML=total;

}



function removeItem(i){

cart.splice(i,1);

save();

update();

}



function openCart(){

document.getElementById("cart-box").style.display="block";

}



function closeCart(){

document.getElementById("cart-box").style.display="none";

}



function openProduct(name,price,img){

current={name,price};

document.getElementById("products").style.display="none";

document.getElementById("product-page").style.display="block";

document.getElementById("product-img").src=img;

document.getElementById("product-name").innerHTML=name;

document.getElementById("product-price").innerHTML="$"+price;

}



function back(){

document.getElementById("product-page").style.display="none";

document.getElementById("products").style.display="block";

}



function filter(type){

document.querySelectorAll(".card").forEach(card=>{

card.style.display=card.classList.contains(type)?"block":"none";

});

}



function showProducts(){

document.getElementById("product-page").style.display="none";

document.getElementById("products").style.display="block";

}



update();

</script>


</body>
</html>
