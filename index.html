<!DOCTYPE html>
<html>
<head>

<title>ASTRIS MOTO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
}


#loader,#product-loader{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}


#loader h1,#product-loader h1{
font-size:45px;
letter-spacing:10px;
}


.dots{
font-size:45px;
margin-top:20px;
}



header{
height:130px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 6%;
background:#000;
position:sticky;
top:0;
z-index:20;
}


.logo{
font-size:60px;
font-weight:900;
letter-spacing:14px;
}


nav{
display:flex;
gap:25px;
}


nav button,.cart{
background:#111;
color:white;
border:1px solid #333;
padding:22px 35px;
border-radius:50px;
font-size:20px;
font-weight:900;
cursor:pointer;
}


.section{
padding:90px 7%;
}


.title{
font-size:70px;
margin-bottom:50px;
}


.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
}


.card{
background:#111;
border-radius:35px;
padding:25px;
opacity:0;
transform:translateY(40px);
transition:.5s;
}


.card.show{
opacity:1;
transform:translateY(0);
}


.card img{
width:100%;
height:250px;
object-fit:cover;
border-radius:25px;
}


.card h2{
margin-top:20px;
font-size:35px;
}



.add,.checkout,.back{
padding:22px 45px;
border:none;
border-radius:50px;
font-size:22px;
font-weight:900;
margin-top:20px;
}


.add,.checkout,.back{
background:white;
color:black;
}


#product-page{
display:none;
}


#product-img{
width:500px;
max-width:100%;
border-radius:30px;
}



#cart-box{
display:none;
position:fixed;
right:25px;
top:140px;
width:420px;
background:#111;
border-radius:35px;
padding:30px;
z-index:100;
}



.cart-item{
display:flex;
justify-content:space-between;
margin:20px 0;
}


.remove{
background:#222;
color:white;
border:none;
padding:10px;
border-radius:30px;
}



@media(max-width:800px){

.cards{
grid-template-columns:1fr;
}

.logo{
font-size:35px;
}


nav button,.cart{
font-size:14px;
padding:15px;
}

}

</style>

</head>


<body>


<div id="loader">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>



<div id="product-loader" style="display:none">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>




<header>

<div class="logo">ASTRIS</div>


<nav>

<button onclick="home()">Home</button>

<button onclick="filter('accessories')">Accessories</button>

<button onclick="filter('clothes')">Clothing</button>

</nav>


<button class="cart" onclick="openCart">

🖤 Cart (<span id="count">0</span>)

</button>


</header>





<section id="products" class="section">


<h1 class="title">Most Popular</h1>


<div class="cards">


<div class="card accessories" onclick="openProduct('Foot Locks',40,'Images/footlocks.jpg')">


<img src="Images/footlocks.jpg" alt="Foot Locks">


<h2>Foot Locks</h2>

<p>$40</p>


</div>


</div>


</section>





<div id="product-page" class="section">


<button class="back" onclick="back()">

← BACK

</button>


<img id="product-img">


<h1 id="product-name"></h1>

<h2 id="product-price"></h2>


<button class="add" onclick="addCurrent()">

🖤 Add To Cart

</button>


</div>






<div id="cart-box">

<h1>Your Cart</h1>

<div id="items"></div>


<h2>Total $<span id="total">0</span></h2>


<button class="checkout">

Checkout

</button>


<button class="back" onclick="closeCart()">

Close

</button>


</div>







<script>


let cart=JSON.parse(localStorage.getItem("cart"))||[];

let current={};



function save(){

localStorage.setItem("cart",JSON.stringify(cart));

}



function add(name,price){

cart.push({name,price});

save();

update();

}



function addCurrent(){

add(current.name,current.price);

}




function update(){

document.getElementById("count").innerHTML=cart.length;


let html="";


let total=0;


cart.forEach((x,i)=>{


total+=x.price;


html+=`

<div class="cart-item">

${x.name} $${x.price}

<button class="remove" onclick="removeItem(${i})">

X

</button>

</div>

`;

});


document.getElementById("items").innerHTML=html;

document.getElementById("total").innerHTML=total;


}



function removeItem(i){

cart.splice(i,1);

save();

update();

}



function openCart(){

document.getElementById("cart-box").style.display="block";

}



function closeCart(){

document.getElementById("cart-box").style.display="none";

}




function openProduct(name,price,img){

current={name,price};


document.getElementById("product-loader").style.display="flex";


setTimeout(()=>{


document.getElementById("product-loader").style.display="none";


document.getElementById("products").style.display="none";

document.getElementById("product-page").style.display="block";


document.getElementById("product-img").src=img;


document.getElementById("product-name").innerHTML=name;


document.getElementById("product-price").innerHTML="$"+price;


},2000);

}




function back(){

document.getElementById("product-page").style.display="none";

document.getElementById("products").style.display="block";

}



function home(){

document.querySelectorAll(".card").forEach(c=>{

c.style.display="block";

});

window.scrollTo(0,0);

}



function filter(type){

document.querySelectorAll(".card").forEach(c=>{

c.style.display=c.classList.contains(type)?"block":"none";

});

window.scrollTo(0,0);

}



window.onload=()=>{

setTimeout(()=>{

document.getElementById("loader").style.display="none";

},2000);


update();

}


</script>


</body>
</html>
