<!DOCTYPE html>
<html>
<head>

<title>Astris Moto</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
}


#loader{

position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;

}


#loader h1{

font-size:50px;
letter-spacing:12px;

}


.dots{

margin-top:25px;
font-size:45px;
animation:blink 1s infinite;

}


@keyframes blink{

50%{opacity:.2;}

}




header{

height:120px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 6%;

position:sticky;

top:0;

background:#000;

z-index:20;

}



.logo{

font-size:55px;

font-weight:900;

letter-spacing:12px;

}



nav{

display:flex;

gap:20px;

}



button{

cursor:pointer;

}


nav button,.cart{

background:#111;

color:white;

border:1px solid #333;

padding:18px 30px;

border-radius:40px;

font-weight:900;

font-size:20px;

}



.section{

padding:100px 7%;

}



.title{

font-size:70px;

margin-bottom:50px;

}




.cards{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:35px;

}



.card{

background:#111;

border-radius:35px;

padding:25px;

opacity:0;

transform:translateY(50px);

transition:.7s;

}



.card.show{

opacity:1;

transform:translateY(0);

}



.card img{

width:100%;

height:250px;

object-fit:cover;

border-radius:25px;

}



.card h2{

margin-top:20px;

font-size:35px;

}



.card p{

color:#aaa;

font-size:22px;

}



@media(max-width:800px){

.cards{

grid-template-columns:1fr;

}


.logo{

font-size:32px;

}


nav button,.cart{

font-size:13px;

padding:12px;

}

}


</style>

</head>


<body>


<div id="loader">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>




<header>


<div class="logo">

ASTRIS

</div>


<nav>

<button onclick="home()">Home</button>

<button onclick="filterProducts('accessories')">Accessories</button>

<button onclick="filterProducts('clothes')">Clothing</button>

</nav>


<button class="cart">

🖤 Cart

</button>


</header>





<section class="section">


<h1 class="title">

Most Popular

</h1>


<div class="cards">



<div class="card accessories">

<img src="Images/footlocks.jpg">

<h2>Foot Locks</h2>

<p>$40</p>

</div>



<div class="card clothes">

<img src="Images/tee.jpg">

<h2>Astris Tee</h2>

<p>$35</p>

</div>


</div>


</section>






<section class="section">


<h1 class="title">

All Products

</h1>


<div class="cards">



<div class="card accessories">

<img src="Images/pegs.jpg">

<h2>Pegs</h2>

<p>$30</p>

</div>




<div class="card accessories">

<img src="Images/stickers.jpg">

<h2>Stickers</h2>

<p>$10</p>

</div>




<div class="card clothes">

<img src="Images/hoodie.jpg">

<h2>Hoodie</h2>

<p>$70</p>

</div>



</div>


</section>





<script>


window.onload=()=>{


setTimeout(()=>{

document.getElementById("loader").style.display="none";


showCards();


},2000);



};



function showCards(){


let cards=document.querySelectorAll(".card");


cards.forEach(card=>{


let observer=new IntersectionObserver(entries=>{


entries.forEach(e=>{

if(e.isIntersecting){

card.classList.add("show");

}

});


});


observer.observe(card);


});


}



function home(){

document.querySelectorAll(".card").forEach(c=>{

c.style.display="block";

});

window.scrollTo({

top:0,

behavior:"smooth"

});

}



function filterProducts(type){


document.querySelectorAll(".card").forEach(card=>{


if(card.classList.contains(type)){

card.style.display="block";

}

else{

card.style.display="none";

}


});


window.scrollTo({

top:0,

behavior:"smooth"

});


}



</script>


</body>
</html>
