<!DOCTYPE html>
<html>
<head>

<title>ASTRIS MOTO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
overflow-x:hidden;
}


#loader,#product-loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
}


#loader h1,#product-loader h1{
font-size:55px;
letter-spacing:12px;
}


.dots{
font-size:45px;
}


header{
height:110px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 5%;
background:#000;
position:sticky;
top:0;
z-index:20;
}


.logo{
font-size:50px;
font-weight:900;
letter-spacing:10px;
}


nav{
display:flex;
gap:15px;
}


nav button,.cart{
background:#111;
color:white;
border:1px solid #333;
padding:18px 30px;
border-radius:50px;
font-size:18px;
font-weight:900;
cursor:pointer;
}


.section{
padding:70px 5%;
}


.title{
font-size:55px;
margin-bottom:40px;
}


.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}


.card{
background:#111;
border-radius:30px;
padding:20px;
opacity:0;
transform:translateY(40px);
transition:.5s;
cursor:pointer;
}


.card.show{
opacity:1;
transform:translateY(0);
}


.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:25px;
}


.card h2{
margin-top:20px;
font-size:25px;
}


.card p{
font-size:20px;
}



.add,.checkout,.back{
padding:18px 40px;
border:none;
border-radius:50px;
font-size:22px;
font-weight:900;
margin-top:20px;
cursor:pointer;
background:white;
color:black;
}



#product-page{
display:none;
text-align:center;
}



#product-page img{
width:450px;
max-width:100%;
display:block;
margin:0 auto 30px;
border-radius:30px;
}



#product-page h1{
font-size:50px;
}


#product-page h2{
font-size:32px;
}



#cart-box{
display:none;
position:fixed;
right:15px;
top:120px;
width:380px;
background:#111;
border:1px solid #333;
border-radius:30px;
padding:25px;
z-index:100;
}



.cart-item{
display:flex;
justify-content:space-between;
margin:15px 0;
}


.remove{
background:#222;
color:white;
border:none;
padding:10px;
border-radius:30px;
}



@media(max-width:800px){

header{
height:85px;
}

.logo{
font-size:25px;
letter-spacing:5px;
}

nav button,.cart{
font-size:12px;
padding:10px 12px;
}

.cards{
grid-template-columns:1fr;
}

.title{
font-size:38px;
}

.card img{
height:250px;
}

#cart-box{
width:90%;
}

}

</style>

</head>

<body>


<div id="loader">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>


<div id="product-loader" style="display:none;">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>


<header>

<div class="logo">ASTRIS</div>


<nav>

<button onclick="home()">Home</button>

<button onclick="filter('accessories')">Accessories</button>

<button onclick="filter('clothes')">Clothing</button>

</nav>


<button class="cart" onclick="openCart()">

🖤 Cart (<span id="count">0</span>)

</button>


</header>


<div id="products" class="section">


<h1 class="title">Most Popular</h1>


<div class="cards">


<div class="card accessories" onclick="openProduct('Foot Locks',40,'Images/footlocks.jpg')">

<img src="Images/footlocks.jpg">

<h2>Foot Locks</h2>

<p>$40</p>

</div>


<div class="card clothes" onclick="openProduct('ASTRIS Tee',35,'Images/tee.jpg')">

<img src="Images/tee.jpg">

<h2>ASTRIS Tee</h2>

<p>$35</p>

</div>


</div>


<h1 class="title">All Products</h1>


<div class="cards">


<div class="card accessories" onclick="openProduct('Pegs',30,'Images/pegs.jpg')">

<img src="Images/pegs.jpg">

<h2>Pegs</h2>

<p>$30</p>

</div>


<div class="card accessories" onclick="openProduct('Stickers',10,'Images/stickers.jpg')">

<img src="Images/stickers.jpg">

<h2>Stickers</h2>

<p>$10</p>

</div>


<div class="card clothes" onclick="openProduct('Hoodie',70,'Images/hoodie.jpg')">

<img src="Images/hoodie.jpg">

<h2>Hoodie</h2>

<p>$70</p>

</div>


</div>

</div> 
  <div id="product-page" class="section">

<img id="product-img">

<h1 id="product-name"></h1>

<h2 id="product-price"></h2>


<button class="add" onclick="addCurrent()">
🖤 Add To Cart
</button>


<button class="checkout" onclick="checkout()">
Checkout
</button>


<button class="back" onclick="back()">
← BACK
</button>

</div>



<div id="cart-box">

<h1>Your Cart</h1>

<div id="items"></div>

<h2>Total $<span id="total">0</span></h2>


<button class="checkout" onclick="checkout()">
Checkout
</button>


<button class="back" onclick="closeCart()">
Close
</button>


</div>




<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let current={};



function save(){

localStorage.setItem("cart",JSON.stringify(cart));

}



function add(name,price){

cart.push({
name:name,
price:price
});

save();

update();

}



function addCurrent(){

add(current.name,current.price);

}




function update(){

document.getElementById("count").innerHTML=cart.length;


let html="";

let total=0;


cart.forEach((x,i)=>{

total+=x.price;


html+=`

<div class="cart-item">

${x.name} $${x.price}

<button class="remove" onclick="removeItem(${i})">

X

</button>

</div>

`;

});


document.getElementById("items").innerHTML=html;

document.getElementById("total").innerHTML=total;

}




function removeItem(i){

cart.splice(i,1);

save();

update();

}




function openCart(){

document.getElementById("cart-box").style.display="block";

}



function closeCart(){

document.getElementById("cart-box").style.display="none";

}




function checkout(){

alert("Checkout coming soon 🖤");

}




function openProduct(name,price,img){


current={
name:name,
price:price
};


document.getElementById("product-loader").style.display="flex";


setTimeout(()=>{


document.getElementById("product-loader").style.display="none";


document.getElementById("products").style.display="none";


document.getElementById("product-page").style.display="block";


document.getElementById("product-img").src=img;


document.getElementById("product-name").innerHTML=name;


document.getElementById("product-price").innerHTML="$"+price;


},1000);


}




function back(){

document.getElementById("product-page").style.display="none";

document.getElementById("products").style.display="block";

}




function home(){

document.querySelectorAll(".card").forEach(c=>{

c.style.display="block";

});

window.scrollTo(0,0);

}




function filter(type){

document.querySelectorAll(".card").forEach(c=>{

c.style.display=
c.classList.contains(type)
?"block"
:"none";

});

window.scrollTo(0,0);

}





window.onload=()=>{


setTimeout(()=>{

document.getElementById("loader").style.display="none";

},2000);



document.querySelectorAll(".card").forEach(card=>{


let observer=new IntersectionObserver(e=>{


if(e[0].isIntersecting){

card.classList.add("show");

}

});


observer.observe(card);


});



update();

}



</script>


</body>
</html>
