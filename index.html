<!DOCTYPE html>
<html>
<head>

<title>ASTRIS MOTO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
}

#loader,#product-loader{

position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;

}

#loader h1,#product-loader h1{

font-size:50px;
letter-spacing:12px;

}

.dots{
font-size:45px;
}



header{

height:130px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 6%;
background:#000;
position:sticky;
top:0;
z-index:20;

}



.logo{

font-size:60px;
font-weight:900;
letter-spacing:14px;

}



nav{

display:flex;
gap:25px;

}



nav button,.cart{

background:#111;
color:white;
border:1px solid #333;
padding:24px 40px;
border-radius:50px;
font-size:22px;
font-weight:900;

}



.section{

padding:90px 7%;

}



.title{

font-size:70px;
margin-bottom:50px;

}



.cards{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;

}



.card{

background:#111;
border-radius:35px;
padding:25px;
opacity:0;
transform:translateY(40px);
transition:.5s;
cursor:pointer;

}



.card.show{

opacity:1;
transform:translateY(0);

}



.card img{

width:100%;
height:250px;
object-fit:cover;
border-radius:25px;

}



.card h2{

margin-top:20px;

}



.add,.checkout,.back{

padding:22px 45px;
border:none;
border-radius:50px;
font-size:24px;
font-weight:900;
margin-top:20px;

}



.add,.checkout{

background:white;
color:black;

}



.back{

background:white;
color:black;

}



/* PRODUCT PAGE FIX */

#product-page{

display:none;
min-height:80vh;
text-align:center;

}



.product-center{

min-height:80vh;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

}



#product-page img{

width:500px;
max-width:90%;
border-radius:30px;
margin-bottom:30px;

}



#product-page h1{

font-size:55px;
margin-bottom:15px;

}



#product-page h2{

font-size:35px;

}




#cart-box{

display:none;

position:fixed;

right:25px;

top:140px;

width:420px;

background:#111;

border:1px solid #333;

border-radius:35px;

padding:30px;

z-index:100;

}



.cart-item{

display:flex;

justify-content:space-between;

margin:20px 0;

}



.remove{

background:#222;

color:white;

border:none;

padding:12px;

border-radius:30px;

}



@media(max-width:800px){

.cards{

grid-template-columns:1fr;

}


.logo{

font-size:35px;

}


nav button,.cart{

font-size:14px;

padding:15px;

}

}


</style>

</head>


<body>


<div id="loader">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>



<div id="product-loader" style="display:none;">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>





<header>

<div class="logo">ASTRIS</div>


<nav>

<button onclick="home()">Home</button>

<button onclick="filter('accessories')">Accessories</button>

<button onclick="filter('clothes')">Clothing</button>

</nav>


<button class="cart" onclick="openCart">

🖤 Cart

</button>

</header>






<div id="products" class="section">


<h1 class="title">Most Popular</h1>


<div class="cards">


<div class="card accessories" onclick="openProduct('Foot Locks',40,'Images/footlocks.jpg')">

<img src="Images/footlocks.jpg">

<h2>Foot Locks</h2>

<p>$40</p>

</div>



<div class="card clothes" onclick="openProduct('ASTRIS Tee',35,'Images/tee.jpg')">

<img src="Images/tee.jpg">

<h2>ASTRIS Tee</h2>

<p>$35</p>

</div>


</div>





<h1 class="title">All Products</h1>


<div class="cards">


<div class="card accessories" onclick="openProduct('Pegs',30,'Images/pegs.jpg')">

<img src="Images/pegs.jpg">

<h2>Pegs</h2>

<p>$30</p>

</div>


<div class="card accessories" onclick="openProduct('Stickers',10,'Images/stickers.jpg')">

<img src="Images/stickers.jpg">

<h2>Stickers</h2>

<p>$10</p>

</div>


<div class="card clothes" onclick="openProduct('Hoodie',70,'Images/hoodie.jpg')">

<img src="Images/hoodie.jpg">

<h2>Hoodie</h2>

<p>$70</p>

</div>


</div>

</div>







<div id="product-page" class="section">


<div class="product-center">


<img id="product-img">


<h1 id="product-name"></h1>

<h2 id="product-price"></h2>



<button class="add">

🖤 Add To Cart

</button>



<button class="checkout">

Checkout

</button>



<button class="back" onclick="back()">

← BACK

</button>


</div>


</div>






<div id="cart-box">

<h1>Your Cart</h1>

<div id="items"></div>

<h2>Total $<span id="total">0</span></h2>


<button class="checkout">

Checkout

</button>


<button class="back" onclick="closeCart()">

Close

</button>


</div>





<script>


function openProduct(name,price,img){

document.getElementById("product-loader").style.display="flex";


setTimeout(()=>{


document.getElementById("product-loader").style.display="none";


document.getElementById("products").style.display="none";

document.getElementById("product-page").style.display="block";


document.getElementById("product-img").src=img;

document.getElementById("product-name").innerHTML=name;

document.getElementById("product-price").innerHTML="$"+price;


},2000);


}



function back(){

document.getElementById("product-page").style.display="none";

document.getElementById("products").style.display="block";

}



function home(){

document.querySelectorAll(".card").forEach(c=>c.style.display="block");

window.scrollTo(0,0);

}



function filter(type){

document.querySelectorAll(".card").forEach(c=>{

c.style.display=c.classList.contains(type)?"block":"none";

});

}


window.onload=()=>{

setTimeout(()=>{

document.getElementById("loader").style.display="none";

},2000);


};


</script>


</body>
</html>
