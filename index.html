<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astris Moto</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#050505;
color:white;
}

header{
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

.menu{
font-size:32px;
cursor:pointer;
}

nav{
display:none;
background:#111;
padding:20px;
}

nav a{
display:block;
color:white;
text-decoration:none;
padding:15px;
font-size:20px;
}

.hero{
padding:60px 25px;
text-align:center;
}

.hero h1{
font-size:50px;
}

.card{
margin:20px;
padding:25px;
background:#151515;
border-radius:20px;
}

button{
background:white;
border:none;
padding:15px 25px;
border-radius:30px;
}
</style>

<script>
function menu(){
let x=document.getElementById("nav");
x.style.display = x.style.display=="block" ? "none":"block";
}
</script>

</head>

<body>

<header>
<div class="logo">ASTRIS</div>
<div class="menu" onclick="menu()">☰</div>
</header>

<nav id="nav">
<a href="#">E-Motos</a>
<a href="#">Dirt Bikes</a>
<a href="#">Accessories</a>
<a href="#">Parts</a>
</nav>

<section class="hero">
<h1>Ride Different.</h1>
<p>Premium parts, upgrades, and gear.</p>
<button>Shop Now</button>
</section>

<div class="card">
<h2>Featured</h2>
<p>⚡ E-Moto upgrades</p>
<p>🔧 Performance parts</p>
<p>🪖 Riding gear</p>
</div>

</body>
</html>
